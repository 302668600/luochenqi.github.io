baseURL = "https://YOUR_GITHUB_USERNAME.github.io/"
languageCode = "zh-cn"
title = "我的个人博客"
theme = "PaperMod"
defaultContentLanguage = "zh"

[params]
  env = "production"
  title = "我的个人博客"
  description = "记录日常、分享知识、沉淀思考"
  author = "你的名字"
  defaultTheme = "auto"  # auto / light / dark
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  
  [params.homeInfoParams]
    Title = "👋 你好，欢迎来到我的博客"
    Content = "这里记录我的每日目标、学习笔记和知识积累。"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/YOUR_GITHUB_USERNAME"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "文章"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "daily"
    name = "每日目标"
    url = "/daily/"
    weight = 20
  [[menu.main]]
    identifier = "wiki"
    name = "知识库"
    url = "/wiki/"
    weight = 30
  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 40
  [[menu.main]]
    identifier = "search"
    name = "搜索"
    url = "/search/"
    weight = 50

[taxonomies]
  tag = "tags"
  category = "categories"

[outputs]
  home = ["HTML", "RSS", "JSON"]
